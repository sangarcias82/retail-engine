<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Retail Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .product-card { transition: transform 0.15s ease-in-out; }
        .product-card:hover { transform: translateY(-2px); }
        .navbar-brand { font-weight: 600; }
        .is-invalid ~ .invalid-feedback { display: block; }
    </style>
</head>
<body>
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/products">Retail Engine</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:classappend="${active == 'catalog'} ? ' active'" href="/products">Catalog</a>
            <a class="nav-link" th:classappend="${active == 'form'} ? ' active'" href="/products/new">New Product</a>
            <a class="nav-link" href="/swagger-ui.html" target="_blank">API Docs</a>
        </div>
    </div>
</nav>
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>
</body>
</html>
