<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Product Catalog')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(active=${active})}"></nav>

<div class="container pb-5">
    <div id="alert-container"></div>

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
        <h1 class="h3 mb-0">Product Catalog</h1>
        <form id="search-form" class="d-flex" style="min-width: 280px;">
            <input type="text" id="search-input" class="form-control me-2" placeholder="Search by name or SKU"/>
            <button type="submit" class="btn btn-outline-primary">Search</button>
        </form>
    </div>

    <div class="card mb-4">
        <div class="card-header bg-white">
            <h2 class="h5 mb-0">Bulk CSV Import</h2>
        </div>
        <div class="card-body">
            <form id="import-form" class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label for="csv-file" class="form-label">Select CSV file</label>
                    <input type="file" id="csv-file" name="file" class="form-control" accept=".csv" required/>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">Upload</button>
                </div>
            </form>
        </div>
    </div>

    <div id="import-result" class="d-none"></div>

    <div id="products-empty" class="alert alert-info d-none">
        No products found. Import a CSV file or create a product manually.
    </div>

    <div id="products-grid" class="row g-4"></div>

    <nav id="pagination-nav" class="d-none mt-4" aria-label="Product catalog pagination">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
            <button type="button" id="prev-page" class="btn btn-outline-secondary btn-sm">Previous</button>
            <span id="page-info" class="text-muted small"></span>
            <button type="button" id="next-page" class="btn btn-outline-secondary btn-sm">Next</button>
        </div>
    </nav>
</div>

<script src="/js/api.js"></script>
<script>
    const alertContainer = document.getElementById('alert-container');
    const productsGrid = document.getElementById('products-grid');
    const productsEmpty = document.getElementById('products-empty');
    const importResult = document.getElementById('import-result');
    const paginationNav = document.getElementById('pagination-nav');
    const pageInfo = document.getElementById('page-info');
    const prevPageBtn = document.getElementById('prev-page');
    const nextPageBtn = document.getElementById('next-page');
    const PAGE_SIZE = 12;
    let currentPage = 0;

    function showAlert(message, type = 'success') {
        alertContainer.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${escapeHtml(message)}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>`;
    }

    function renderProducts(products) {
        productsGrid.innerHTML = '';
        if (!products.length) {
            productsEmpty.classList.remove('d-none');
            return;
        }
        productsEmpty.classList.add('d-none');

        products.forEach(product => {
            const stockBadge = product.stock > 0 ? 'bg-success' : 'bg-danger';
            const disabled = product.stock <= 0 ? 'disabled' : '';
            const col = document.createElement('div');
            col.className = 'col-md-6 col-lg-4';
            col.innerHTML = `
                <div class="card product-card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h3 class="h5 card-title mb-0">${escapeHtml(product.name)}</h3>
                            <span class="badge bg-secondary">${escapeHtml(product.category)}</span>
                        </div>
                        <p class="text-muted small mb-1">SKU: ${escapeHtml(product.sku)}</p>
                        <p class="card-text flex-grow-1">${escapeHtml(product.description || '')}</p>
                        <div class="mb-3">
                            <span class="fw-bold fs-5">${formatPrice(product.price)}</span>
                            <span class="text-muted ms-2">${escapeHtml(product.weightKg)} kg</span>
                        </div>
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <a href="/products/${product.id}/edit" class="btn btn-outline-primary btn-sm">Edit</a>
                            <button type="button" class="btn btn-outline-danger btn-sm btn-delete" data-id="${product.id}">Delete</button>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <span class="badge ${stockBadge}">Stock: ${product.stock}</span>
                            <div class="d-flex align-items-center gap-2">
                                <input type="number" class="form-control form-control-sm purchase-qty" value="1" min="1" max="${product.stock}" style="width: 70px;" ${disabled}/>
                                <button type="button" class="btn btn-success btn-sm btn-purchase" data-id="${product.id}" ${disabled}>Purchase</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            productsGrid.appendChild(col);
        });
    }

    function renderPagination(pageData) {
        if (!pageData || pageData.totalPages <= 1) {
            paginationNav.classList.add('d-none');
            return;
        }

        paginationNav.classList.remove('d-none');
        pageInfo.textContent = `Page ${pageData.number + 1} of ${pageData.totalPages} (${pageData.totalElements} products)`;
        prevPageBtn.disabled = pageData.first;
        nextPageBtn.disabled = pageData.last;
    }

    function currentSearchTerm() {
        return document.getElementById('search-input').value.trim();
    }

    async function loadProducts(search = '', page = 0) {
        currentPage = page;
        try {
            const params = new URLSearchParams({ page: String(page), size: String(PAGE_SIZE) });
            if (search) {
                params.set('search', search);
            }
            const pageData = await apiRequest(`${API_BASE}?${params}`);
            renderProducts(pageData.content || []);
            renderPagination(pageData);
        } catch (error) {
            showAlert(error.body?.message || error.message, 'danger');
        }
    }

    document.getElementById('search-form').addEventListener('submit', event => {
        event.preventDefault();
        loadProducts(currentSearchTerm(), 0);
    });

    prevPageBtn.addEventListener('click', () => {
        if (currentPage > 0) {
            loadProducts(currentSearchTerm(), currentPage - 1);
        }
    });

    nextPageBtn.addEventListener('click', () => {
        loadProducts(currentSearchTerm(), currentPage + 1);
    });

    document.getElementById('import-form').addEventListener('submit', async event => {
        event.preventDefault();
        const fileInput = document.getElementById('csv-file');
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const result = await apiRequest(`${API_BASE}/import`, { method: 'POST', body: formData });
            const errorCount = result.errors?.length ?? 0;
            const summaryClass = errorCount > 0 ? 'alert-warning' : 'alert-success';
            const summaryText = errorCount > 0
                ? `<strong>${result.processedCount}</strong> records processed with <strong>${errorCount}</strong> line error(s).`
                : `<strong>${result.processedCount}</strong> records processed successfully.`;
            let html = `<div class="card mb-4"><div class="card-body">
                <div class="alert ${summaryClass} mb-0">${summaryText}</div>`;
            if (errorCount > 0) {
                html += `<div class="alert alert-danger mt-3"><h3 class="h6">Import Errors</h3><ul class="mb-0">`;
                result.errors.forEach(err => { html += `<li>${escapeHtml(err)}</li>`; });
                html += `</ul></div>`;
            }
            html += `</div></div>`;
            importResult.innerHTML = html;
            importResult.classList.remove('d-none');
            fileInput.value = '';
            await loadProducts(currentSearchTerm(), currentPage);
        } catch (error) {
            showAlert(error.body?.message || error.message, 'danger');
        }
    });

    productsGrid.addEventListener('click', async event => {
        const purchaseBtn = event.target.closest('.btn-purchase');
        const deleteBtn = event.target.closest('.btn-delete');

        if (purchaseBtn) {
            const productId = purchaseBtn.dataset.id;
            const qtyInput = purchaseBtn.closest('.d-flex').querySelector('.purchase-qty');
            try {
                const body = await apiRequest(`${API_BASE}/purchase`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: Number(productId), quantity: Number(qtyInput.value) })
                });
                showAlert(body.message, 'success');
                await loadProducts(currentSearchTerm(), currentPage);
            } catch (error) {
                showAlert(error.body?.message || error.message, 'danger');
            }
        }

        if (deleteBtn) {
            if (!confirm('Delete this product permanently?')) {
                return;
            }
            try {
                const body = await apiRequest(`${API_BASE}/${deleteBtn.dataset.id}`, { method: 'DELETE' });
                showAlert(body.message, 'success');
                await loadProducts(currentSearchTerm(), currentPage);
            } catch (error) {
                showAlert(error.body?.message || error.message, 'danger');
            }
        }
    });

    document.addEventListener('DOMContentLoaded', () => loadProducts());
</script>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
