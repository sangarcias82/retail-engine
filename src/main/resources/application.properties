spring.application.name=retail-engine

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/retail_engine}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:retail_engine}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:retail_engine}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

spring.threads.virtual.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
